name: Codex Audit

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: codex-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate content JSON
        run: python scripts/codex/audit_repo.py --check json

      - name: Validate scenes and autoloads
        run: python scripts/codex/audit_repo.py --check scenes

      - name: Validate GitHub community files
        run: python scripts/codex/audit_repo.py --check github

      - name: Validate repository hygiene
        run: python scripts/codex/audit_repo.py --check hygiene
